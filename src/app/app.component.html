<div class="app-shell">

  <!-- NAOLOGIC TOP NAV -->
  <nav class="top-nav">
    <span class="logo">
      <img src="assets/Shape.svg" alt="NaoLogic" onerror="this.style.display='none';this.nextElementSibling.style.display='inline'">
      <span class="logo-fallback" style="display:none">
        <span class="logo-nao">NAO</span><span class="logo-logic">LOGIC</span>
      </span>
    </span>
  </nav>

  <!-- PAGE CONTENT -->
  <main class="page-content">
    <h1 class="page-title">Work Orders</h1>

    <!-- Controls -->
    <div class="controls-row">
      <div class="timescale-wrap">
        <div class="timescale-group">
          <span class="ts-label">Timescale</span>
          <button class="zoom-dropdown-btn" (click)="toggleDropdown($event)">
            {{ zoomLabel }}
            <img src="assets/Down.svg" alt="" class="chevron-icon"
                 [style.transform]="dropdownOpen ? 'rotate(180deg)' : 'rotate(0)'"
                 onerror="this.style.display='none'">
          </button>
        </div>
        <div class="zoom-menu" *ngIf="dropdownOpen" (click)="$event.stopPropagation()">
          <button class="zoom-option" [class.active]="zoom === 'hour'"  (click)="setZoom('hour')">Hour</button>
          <button class="zoom-option" [class.active]="zoom === 'day'"   (click)="setZoom('day')">Day</button>
          <button class="zoom-option" [class.active]="zoom === 'week'"  (click)="setZoom('week')">Week</button>
          <button class="zoom-option" [class.active]="zoom === 'month'" (click)="setZoom('month')">Month</button>
        </div>
      </div>
      <button class="today-btn" (click)="goToToday()">Today</button>
    </div>

    <!-- Timeline fills full width -->
    <div class="timeline-wrap">
      <app-timeline #timeline />
    </div>
  </main>

  <!-- Panel is fixed/overlay — not in the flex flow -->
  <app-create-edit-panel />

</div>
