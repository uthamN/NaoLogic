<div class="bar" [ngClass]="workOrder.data.status" (click)="onBarClick($event)">
  <span class="bar-name">{{ workOrder.data.name }}</span>
  <span *ngIf="showBadge" class="bar-badge" [ngClass]="workOrder.data.status">
    {{ statusLabel }}
  </span>
  <button class="menu-btn" (click)="toggleMenu($event)" title="Actions">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor">
      <circle cx="7" cy="2" r="1.2"/>
      <circle cx="7" cy="7" r="1.2"/>
      <circle cx="7" cy="12" r="1.2"/>
    </svg>
  </button>
</div>

<!-- Dropdown rendered at fixed viewport position to escape any overflow clipping -->
<div
  *ngIf="menuOpen"
  class="dropdown"
  [style.top.px]="dropdownPos().top"
  [style.left.px]="dropdownPos().left"
  (click)="$event.stopPropagation()"
>
  <button class="drop-item" (click)="edit()">
    <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
      <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4z"/>
    </svg>
    Edit
  </button>
  <button class="drop-item danger" (click)="delete()">
    <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <polyline points="3 6 5 6 21 6"/>
      <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
      <path d="M10 11v6M14 11v6M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
    </svg>
    Delete
  </button>
</div>
